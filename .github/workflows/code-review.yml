name: code-review

# Auto-reviews human-authored PRs by posting a trigger comment.
# The opencode.yml workflow picks up the comment and performs the review.
# Uses GitHub App token (preferred) or GH_PERSONAL_TOKEN as fallback
# to bypass GITHUB_TOKEN restrictions on write operations.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: code-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger-review:
    if: >-
      !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        continue-on-error: true
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check token availability
        id: check-token
        run: |
          if [ -z "${{ steps.app-token.outputs.token }}" ] && [ -z "${{ secrets.GH_PERSONAL_TOKEN }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No write-capable token available. Configure APP_ID/APP_PRIVATE_KEY or GH_PERSONAL_TOKEN secrets to enable automated reviews."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review trigger comment
        if: steps.check-token.outputs.available == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.app-token.outputs.token || secrets.GH_PERSONAL_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `/oc Review this pull request. Perform these steps IN ORDER:\n\n1. **Understand the change**: Read the PR title, description, and linked issues. Summarize what this PR changes and why.\n2. **Diff review**: For each changed file, check for bugs, logic errors, off-by-one errors, missing error handling, and type safety issues. Reference specific file:line numbers.\n3. **Project conventions**: Verify adherence to project standards — TypeScript strict mode with explicit types, Zod schemas for all tool input validation, proper MCP tool definition patterns, handler pattern compliance (tool → handler → response), @/* import aliases, null for intentional absence / undefined for uninitialized.\n4. **Security**: Check for exposed secrets, missing input validation on tool parameters, and insecure API key handling.\n5. **Test coverage**: Verify new code paths have corresponding tests. Check test naming follows "should ..." pattern.\n6. **Preexisting issues**: Do NOT flag preexisting issues that are not part of this PR's changes.\n7. **Verdict**: Approve the PR if all issues are addressed in a reasonable way. Request changes otherwise. Give a clear MERGE / REQUEST CHANGES / NEEDS DISCUSSION verdict.`
            });