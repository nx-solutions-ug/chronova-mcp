name: opencode

# Interactive opencode agent triggered by /oc or /opencode mentions.
# Uses OIDC token exchange with the opencode.ai API to obtain a GitHub App
# installation token with write permissions.
#
# NOTE: We install opencode CLI directly (pinned version) instead of using the
# anomalyco/opencode/github composite action, because the composite action always
# downloads the LATEST opencode binary regardless of the action tag. Latest builds
# (v1.14.21+) have a broken symlink (AGENTS.md → README.md) that causes GitHub Actions
# staging to fail with "InstanceRef not provided".

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        continue-on-error: true
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check token availability
        id: check-token
        run: |
          if [ -z "${{ steps.app-token.outputs.token }}" ] && [ -z "${{ secrets.GH_PERSONAL_TOKEN }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No write-capable token available. Configure APP_ID/APP_PRIVATE_KEY or GH_PERSONAL_TOKEN secrets to enable automated reviews."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install opencode (pinned)
        if: steps.check-token.outputs.available == 'true'
        shell: bash
        run: |
          curl -fsSL https://opencode.ai/install | bash -s -- --version v1.14.20
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Run opencode
        if: steps.check-token.outputs.available == 'true'
        shell: bash
        run: opencode github run
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          MODEL: ollama-cloud/glm-5.1