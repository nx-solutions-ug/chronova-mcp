name: Issue Triage

# Auto-triages new issues by posting a trigger comment.
# Uses GitHub App token (preferred) or GH_PERSONAL_TOKEN as fallback
# to ensure write permissions regardless of the triggering actor.

on:
  issues:
    types: [opened]

jobs:
  trigger-triage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write

    steps:
      - name: Check account age
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const user = await github.rest.users.getByUsername({
              username: context.payload.issue.user.login
            });
            const created = new Date(user.data.created_at);
            const days = (Date.now() - created) / (1000 * 60 * 60 * 24);
            return days >= 30;
          result-encoding: string

      - name: Generate GitHub App Token
        if: steps.check.outputs.result == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        continue-on-error: true
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check token availability
        if: steps.check.outputs.result == 'true'
        id: check-token
        run: |
          if [ -z "${{ steps.app-token.outputs.token }}" ] && [ -z "${{ secrets.GH_PERSONAL_TOKEN }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No write-capable token available. Configure APP_ID/APP_PRIVATE_KEY or GH_PERSONAL_TOKEN secrets to enable automated reviews."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post triage trigger comment
        if: steps.check.outputs.result == 'true' && steps.check-token.outputs.available == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.app-token.outputs.token || secrets.GH_PERSONAL_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `/oc Load the skill gh-issue-triage. Triage this issue by performing these steps IN ORDER:\n\n1. **Ensure labels exist**: Create any missing labels (\`gh label create\`, ignore 422 already exists). Required taxonomy:\n   - Type (mutually exclusive): \`bug\` (color d73a4a), \`feature\` (color a2eeef), \`enhancement\` (color 84b6eb), \`docs\` (color 0075ca), \`chore\` (color fef2c0)\n   - Priority (mutually exclusive): \`priority: critical\` (color e11d48), \`priority: high\` (color fb923c), \`priority: medium\` (color fbbf24), \`priority: low\` (color 22c55e)\n   - Status: \`needs-triage\` (color 7c8f80), \`needs-info\` (color d876e3), \`accepted\` (color 0e8a16)\n2. **Categorize**: Apply exactly ONE type label and ONE priority label using \`gh issue edit NUMBER --add-label\`.\n   - Type: bug (broken), feature (new capability), enhancement (improve existing), docs (documentation), chore (maintenance/infra)\n   - Priority: critical (production down/security), high (major impact), medium (normal), low (nice-to-have)\n3. **Check duplicates**: Search open and closed issues for duplicates. If found, close as duplicate and link the original.\n4. **Check clarity**: If the issue lacks repro steps, logs, or acceptance criteria, add the needs-info label and comment asking for specifics.\n5. **Finalize labeling**: Remove the needs-triage label. Add the accepted label. Assign to a milestone if obvious. Assign to @niklasschaeffer if no other assignee is clear.\n6. **Comment**: Only if there's a clear fix or relevant docs — provide documentation links, error handling guidance, and a concrete suggested fix. Otherwise, do NOT post a comment.`
            });