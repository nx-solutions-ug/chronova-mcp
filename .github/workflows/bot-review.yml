name: bot-review

# Reviews bot-authored PRs (renovate, dependabot, opencode-agent) and
# dependency updates. Uses GitHub App token to bypass the GITHUB_TOKEN
# write restriction that applies to bot-triggered events.
# Posts a trigger comment that opencode.yml picks up via issue_comment.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: bot-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger-bot-review:
    if: >-
      endsWith(github.event.pull_request.user.login, '[bot]') ||
      contains(github.event.pull_request.user.login, 'opencode-agent')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Check if re-review is needed
        id: re-review-check
        if: github.event.action == 'synchronize'
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            // On synchronize, check who pushed the latest commit.
            // If opencode-agent pushed it (fixing issues from a previous review),
            // skip re-triggering to avoid an infinite review loop.
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            const headSha = pr.head.sha;
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha
            });
            const author = commit.commit.author.name || '';
            const committer = commit.commit.committer.name || '';
            const isAgentCommit = author.includes('opencode-agent') || committer.includes('opencode-agent')
              || author.includes('opencode') || committer.includes('opencode')
              || author.includes('github-actions') || committer.includes('github-actions');
            return isAgentCommit ? 'false' : 'true';

      - name: Determine review prompt
        id: prompt
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [[ "$PR_AUTHOR" == *"renovate"* ]] || [[ "$PR_AUTHOR" == *"dependabot"* ]]; then
            echo "type=dependency" >> "$GITHUB_OUTPUT"
          elif [[ "$PR_AUTHOR" == *"opencode-agent"* ]]; then
            echo "type=opencode" >> "$GITHUB_OUTPUT"
          else
            echo "type=code" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        continue-on-error: true
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check token availability
        id: check-token
        run: |
          if [ -z "${{ steps.app-token.outputs.token }}" ] && [ -z "${{ secrets.GH_PERSONAL_TOKEN }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No write-capable token available. Configure APP_ID/APP_PRIVATE_KEY or GH_PERSONAL_TOKEN secrets to enable automated reviews."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review trigger comment
        if: >-
          steps.check-token.outputs.available == 'true' &&
          (github.event.action != 'synchronize' || steps.re-review-check.outputs.result == 'true')
        uses: actions/github-script@v9
        env:
          REVIEW_TYPE: ${{ steps.prompt.outputs.type }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        with:
          github-token: ${{ steps.app-token.outputs.token || secrets.GH_PERSONAL_TOKEN }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const prTitle = process.env.PR_TITLE;
            const reviewType = process.env.REVIEW_TYPE;

            let body;
            if (reviewType === 'dependency') {
              body = `/oc Review dependency update PR #${prNumber}: "${prTitle}". Perform these steps IN ORDER:\n\n1. **Identify changes**: Run \`gh pr diff ${prNumber}\` and list every package being updated with old → new version.\n2. **Research changelogs**: For each package, find the release notes between the old and new version. Call out any breaking changes, security fixes, and deprecations.\n3. **Assess impact**: Check if any changed APIs are used in this codebase (search for imports/usages). Note if lockfile or peer deps are affected.\n4. **Check for existing summary**: Use case-insensitive regex to check if a "Dependency Update Summary" comment already exists on this PR:\n   \`gh api /repos/{owner}/{repo}/issues/${prNumber}/comments --jq '.[] | select(.body | test("Dependency Update Summary"; "i")) | {id: .id, created_at: .created_at}'\`\n   - If one or more matching comments found: keep only the newest, delete older duplicates, update the newest with new review content.\n   - If none found: create a new comment.\n5. **Post Dependency Update Summary** with:\n   - ## Dependency Update Summary\n   - Changes table (Package, From, To, Type: major/minor/patch)\n   - Release highlights (breaking changes, security fixes, new features)\n   - Impact assessment checklist (affected code paths, config changes needed)\n   - Recommendation: SAFE TO MERGE / REVIEW RECOMMENDED / ACTION REQUIRED\n6. **Label the PR**: Ensure labels exist (\`gh label create\` if missing, ignore 422 already exists), then apply:\n   - Type: \`chore\` (dependency updates are maintenance)\n   - Priority: \`priority: low\` for patch, \`priority: medium\` for minor, \`priority: high\` for major or security fixes\n   Run: \`gh pr edit ${prNumber} --add-label "chore" --add-label "priority:LEVEL"\`\n7. **Approve** the PR if SAFE TO MERGE, otherwise leave a review requesting changes.`;
            } else if (reviewType === 'opencode') {
              body = `/oc Review bot-authored PR #${prNumber}: "${prTitle}". Perform these steps IN ORDER:\n\n1. **Understand intent**: Read the PR description and linked issue. Summarize what the PR intends to change.\n2. **Fetch review threads**: Use GraphQL to get all existing review threads. Filter to bot-authored threads only. Auto-resolve any that are outdated or fixed.\n3. **Diff review**: Run \`gh pr diff ${prNumber}\` and for each changed file, check for: bugs, logic errors, missing error handling, type safety (no \`as any\`, no \`@ts-ignore\`), performance issues, dead code, unreachable code, magic numbers, poor naming, deep nesting, and complex conditionals.\n4. **Project conventions**: Verify adherence to AGENTS.md — import order (Node built-ins → external → @/* → relative), camelCase functions/vars, PascalCase interfaces/types, kebab-case files, Zod schemas for API inputs, prisma singleton, Redis circuit breaker, tailwind breakpoint overrides (sm=768px, md=1024px, lg=1280px, xl=1440px).\n5. **Security**: Check for exposed secrets, SQL injection in raw queries, XSS, missing input validation, and auth bypasses.\n6. **Test coverage**: Verify new code paths have corresponding Jest tests. Check test naming follows "should ..." pattern.\n7. **Deduplicate**: For each identified issue, check unresolved bot threads for semantic matches (same file + same issue type + within ±5 lines = duplicate). Skip duplicates.\n8. **Post review**: Bundle all new inline comments into a single batched review. REQUEST_CHANGES if new issues found, APPROVE if clean, skip if only existing unresolved threads remain. Use PR diff line numbers and repo-relative paths.\n9. **Label the PR**: Ensure labels exist (\`gh label create\` if missing, ignore 422 already exists), then apply based on review findings:\n   - Type (mutually exclusive): \`bug\` (fixes a bug), \`feature\` (new capability), \`enhancement\` (improves existing), \`docs\` (documentation), \`chore\` (maintenance/infra)\n   - Priority (mutually exclusive): \`priority: critical\` (security/data loss), \`priority: high\` (major impact), \`priority: medium\` (normal), \`priority: low\` (nice-to-have)\n   Run: \`gh pr edit ${prNumber} --add-label "TYPE" --add-label "priority:LEVEL"\`\n10. **Approve** if all issues are addressed. Request changes otherwise with specific file:line references.`;
            } else {
              body = `/oc Review this pull request. Perform these steps IN ORDER:\n\n1. **Understand the change**: Read the PR title, description, and linked issues. Summarize what this PR changes and why.\n2. **Fetch review threads**: Use GraphQL to get all existing review threads. Filter to bot-authored threads only. Auto-resolve any that are outdated or fixed.\n3. **Diff review**: Run \`gh pr diff\` and for each changed file, check for: bugs, logic errors, missing error handling, type safety (no \`as any\`, no \`@ts-ignore\`), performance issues, dead code, unreachable code, magic numbers, poor naming, deep nesting, and complex conditionals.\n4. **Project conventions**: Verify adherence to AGENTS.md — import order (Node built-ins → external → @/* → relative), camelCase functions/vars, PascalCase interfaces/types, kebab-case files, Zod schemas for API inputs, prisma singleton, Redis circuit breaker, tailwind breakpoint overrides (sm=768px, md=1024px, lg=1280px, xl=1440px).\n5. **Security**: Check for exposed secrets, SQL injection in raw queries, XSS, missing input validation, and auth bypasses.\n6. **Test coverage**: Verify new code paths have corresponding Jest tests. Check test naming follows "should ..." pattern.\n7. **Deduplicate**: For each identified issue, check unresolved bot threads for semantic matches (same file + same issue type + within ±5 lines = duplicate). Skip duplicates.\n8. **Post review**: Bundle all new inline comments into a single batched review. REQUEST_CHANGES if new issues found, APPROVE if clean, skip if only existing unresolved threads remain. Use PR diff line numbers and repo-relative paths.\n9. **Label the PR**: Ensure labels exist (\`gh label create\` if missing, ignore 422 already exists), then apply based on review findings:\n   - Type (mutually exclusive): \`bug\` (fixes a bug), \`feature\` (new capability), \`enhancement\` (improves existing), \`docs\` (documentation), \`chore\` (maintenance/infra)\n   - Priority (mutually exclusive): \`priority: critical\` (security/data loss), \`priority: high\` (major impact), \`priority: medium\` (normal), \`priority: low\` (nice-to-have)\n   Run: \`gh pr edit {pr_number} --add-label "TYPE" --add-label "priority:LEVEL"\`\n10. **Preexisting issues**: Do NOT flag preexisting issues that are not part of this PR's changes.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });