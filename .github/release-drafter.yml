name-template: v$RESOLVED_VERSION
tag-template: v$RESOLVED_VERSION
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
template: |
  ## Changes

  $CHANGES

categories:
  - title: 🚀 Features
    labels:
      - feature
      - enhancement
  - title: 🐛 Bug Fixes
    labels:
      - bug
      - fix
  - title: 🧰 Maintenance
    labels:
      - chore
      - docs
      - documentation
  - title: 🔄 Dependencies
    labels:
      - renovatebot

version-resolver:
  major:
    labels:
      - "priority: critical"
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - fix
      - chore
      - docs
      - documentation
      - renovatebot

exclude-labels:
  - needs-triage
  - needs-info
  - released